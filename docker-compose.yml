version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: clipflow
      POSTGRES_USER: clipflow
      POSTGRES_PASSWORD: clipflow_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build: ./backend
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://clipflow:clipflow_secret@postgres:5432/clipflow
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=super_secret_jwt_key_change_in_production
      - TIKTOK_CLIENT_KEY=${TIKTOK_CLIENT_KEY}
      - TIKTOK_CLIENT_SECRET=${TIKTOK_CLIENT_SECRET}
      - FRONTEND_URL=http://localhost:3000
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      - postgres
      - redis

  worker:
    build: ./backend
    command: node src/workers/postWorker.js
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://clipflow:clipflow_secret@postgres:5432/clipflow
      - REDIS_URL=redis://redis:6379
      - TIKTOK_CLIENT_KEY=${TIKTOK_CLIENT_KEY}
      - TIKTOK_CLIENT_SECRET=${TIKTOK_CLIENT_SECRET}
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      - postgres
      - redis

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:4000
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
